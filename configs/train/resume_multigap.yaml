config: configs/train/resume_multigap.yaml
ds_dir: data/processed/multigap
sample: wav_test_multigap_4x_1p0s_2p0s_5p0s_10p0s
auto_hparam: true

wav_path: data/interim/gapped_audio.wav
target_sr: 24000
bandwidth: 6.0
gap_start_s: 200.0
gap_end_s: 210.0

d_model: 512
n_heads: 8
n_layers: 8
max_len: 1124
dropout: 0.1

seq_len: 1124
mask_len_min: 187
mask_len_max: 750
ctx_left: null
ctx_right: null

batch_size: 16
lr: 0.0003
weight_decay: 0.01
betas: [0.9, 0.95]
grad_clip: 1.5
warmup_steps: 7000
total_steps: 1400000
log_every: 6000
save_every: 54000
test_fill_every: 54000
validation_every: 54000
validation_examples_per_band: 64
validation_batch_size: 16
num_workers: 2

output_dir: outputs/runs
run_name: longrun_multigap_1400k
seed: 42
device: cuda:2

resume: outputs/runs/longrun_multigap_1400k/checkpoints/latest.pt
inpaint_only: false
inpaint_iters: 1
inpaint_output: null

curriculum: true
curriculum_start_mask: 400
curriculum_end_mask: 750
curriculum_warmup_frac: 0.0
curriculum_schedule: linear

activity_smooth_kernel: 9
activity_low_quantile: 0.30
activity_high_quantile: 0.70
weighted_sampling: true
dead_window_min_mean: 0.01
dead_window_min_ratio: 0.03
regime_active_prob: 0.45
regime_transition_prob: 0.30
regime_low_prob: 0.15
regime_uniform_prob: 0.10
mask_stride: 1
activity_guided_masking: true
